<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Coach v3.1 (Pixel Fix)</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: white; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 25px; background: #161616; position: relative; }
        .race-phase-box { background: #004466; color: #00d4ff; padding: 10px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; border: 1px solid #00d4ff; text-transform: uppercase; min-height: 1.5em; }
        .timer-display { font-size: 6rem; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; line-height: 1; }
        .action-text { font-size: 1.6rem; font-weight: bold; color: #ffcc00; min-height: 45px; margin-bottom: 10px; text-transform: uppercase; }
        .zone-display { font-size: 1.3rem; padding: 15px; border-radius: 15px; margin-bottom: 10px; font-weight: bold; border: 2px solid transparent; }
        .hr-target { font-size: 1.5rem; color: #fff; display: block; margin-top: 5px; font-weight: 800; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #222; padding: 10px; border-radius: 12px; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        button { background: #00d4ff; color: black; border: none; padding: 18px; font-size: 1.3rem; font-weight: bold; border-radius: 15px; width: 100%; margin-top: 10px; cursor: pointer; }
        select { width:100%; padding:12px; margin-bottom: 10px; background:#222; color:white; border-radius:10px; border: 1px solid #444; }
        .zone-5 { background: #7a0000; border-color: #ff0000; }
        .zone-4 { background: #855500; border-color: #ffa500; }
        .zone-2 { background: #1b4d21; border-color: #4caf50; }
        #wakeLockStatus { font-size: 0.65rem; color: #ff4444; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
        #summaryOverlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; justify-content:center; align-items:center; }
    </style>
</head>
<body>

<div class="container">
    <div id="racePhase" class="race-phase-box">PIXEL OPTIMIZED</div>
    
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Total Time</div><div id="totalTime">00:00</div></div>
        <div class="stat-box"><div class="stat-label">Round / Goal</div><div id="roundInfo">0 / --</div></div>
    </div>

    <select id="workoutSelect" onchange="resetDisplay()">
        <option value="raceReality">Race Reality (1:20 Sim)</option>
        <option value="stackers">30/30/30 Stackers</option>
        <option value="redline">VO2 Max "Redline"</option>
    </select>

    <div class="timer-display" id="intervalTimer">05:00</div>
    <div id="currentAction" class="action-text">WARM-UP</div>
    
    <div id="zoneDisplay" class="zone-display zone-warm">
        <span id="zoneName">Z1: PREP</span>
        <span id="hrRange" class="hr-target">140 - 155 BPM</span>
    </div>
    
    <button id="startBtn">START SESSION</button>
    <button id="cooldownBtn" style="display:none; background:#004466; color:white;">START COOLDOWN</button>
    <div id="wakeLockStatus">PROTECTION: STANDBY</div>
</div>

<div id="summaryOverlay">
    <div style="background:#1e1e1e; padding:30px; border-radius:25px; border:2px solid #00d4ff; max-width:85%;">
        <h2 style="color:#00d4ff; margin-top:0;">GOAL ACHIEVED!</h2>
        <div id="summaryStats" style="font-size:1rem; line-height:1.6; margin:20px 0; text-align:left; color:#ccc;"></div>
        <button onclick="location.reload()" style="background:#ffcc00; color:black;">LOG & RESET</button>
    </div>
</div>

<script>
    let wakeLock = null;

    // Enhanced WakeLock for Android/Chrome
    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('wakeLockStatus').innerText = "PROTECTION: ACTIVE";
                document.getElementById('wakeLockStatus').style.color = "#00ff00";
                
                wakeLock.addEventListener('release', () => {
                    console.log('Wake Lock was released');
                });
            } catch (err) {
                document.getElementById('wakeLockStatus').innerText = "PROTECTION: FAILED (Low Battery?)";
                console.error(`${err.name}, ${err.message}`);
            }
        } else {
            document.getElementById('wakeLockStatus').innerText = "BROWSER NOT SUPPORTED";
        }
    }

    // Re-request when page is visible again
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    const workouts = {
        raceReality: { goal: "4-6", intervals: [
            { name: "Heavy Resistance", duration: 40, zone: "Z4: Threshold", hr: "185-195", race: "Pushing Heavy Water", class: "zone-4", allowCD: false },
            { name: "BREATH HOLD & SPRINT", duration: 40, zone: "Z5: MAX", hr: "196-210", race: "Final 25m - No Words!", class: "zone-5", allowCD: false },
            { name: "Active Recovery", duration: 180, zone: "Z2: Recovery", hr: "150-165", race: "Clear the Lactate", class: "zone-2", allowCD: true }
        ]},
        stackers: { goal: "8-12", intervals: [
            { name: "High RPM Build", duration: 30, zone: "Z3: Tempo", hr: "170-185", race: "Fast Feet", class: "zone-3", allowCD: false },
            { name: "GRIND GEAR MAX", duration: 30, zone: "Z5: MAX", hr: "196-210", race: "Explosive Power", class: "zone-5", allowCD: false },
            { name: "Short Rest", duration: 30, zone: "Z2: Recovery", hr: "155-170", race: "Buffer the Burn", class: "zone-2", allowCD: true }
        ]},
        redline: { goal: "5-8", intervals: [
            { name: "Standing Power", duration: 60, zone: "Z5: Redline", hr: "195-210", race: "Engine Growth", class: "zone-5", allowCD: false },
            { name: "Full Recovery", duration: 60, zone: "Z2: Recovery", hr: "150-165", race: "Oxygen Recovery", class: "zone-2", allowCD: true }
        ]}
    };

    let phase = "WARMUP", currentInterval = 0, timeLeft = 300, totalSeconds = 0, timerId = null, rounds = 0;

    function formatTime(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }
    function resetDisplay() { const w = workouts[document.getElementById('workoutSelect').value]; document.getElementById('roundInfo').innerText = "0 / " + w.goal; }
    function beep(freq) { try { const ctx = new AudioContext(); const osc = ctx.createOscillator(); osc.frequency.setValueAtTime(freq, ctx.currentTime); osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.2); } catch(e){} }

    function tick() {
        if (timeLeft > 0) {
            timeLeft--; totalSeconds++;
            if (timeLeft < 4 && timeLeft > 0) beep(500);
            if (timeLeft === 0) beep(900);
        } else {
            if (phase === "WARMUP") { 
                phase = "WORKOUT"; rounds = 1; 
                timeLeft = workouts[document.getElementById('workoutSelect').value].intervals[0].duration; 
            } else if (phase === "WORKOUT") {
                currentInterval++;
                const wSet = workouts[document.getElementById('workoutSelect').value].intervals;
                if (currentInterval >= wSet.length) { currentInterval = 0; rounds++; }
                timeLeft = wSet[currentInterval].duration;
            } else if (phase === "COOLDOWN") {
                clearInterval(timerId);
                if(wakeLock) wakeLock.release();
                document.getElementById('summaryOverlay').style.display = "flex";
                document.getElementById('summaryStats').innerHTML = `
                    <p><strong>Total Session:</strong> ${formatTime(totalSeconds)}</p>
                    <p><strong>Total Rounds:</strong> ${rounds}</p>
                    <hr style="border:0; border-top:1px solid #444;">
                    <p style="color:#00d4ff"><strong>Recovery Check:</strong></p>
                    <p>Did HR drop >30bpm in the first minute of recovery?</p>
                `;
                return;
            }
        }
        update();
    }

    function update() {
        document.getElementById('intervalTimer').innerText = formatTime(timeLeft);
        document.getElementById('totalTime').innerText = formatTime(totalSeconds);
        const w = workouts[document.getElementById('workoutSelect').value];
        document.getElementById('roundInfo').innerText = rounds + " / " + w.goal;

        if (phase === "WARMUP") {
            document.getElementById('racePhase').innerText = "PRIME THE SYSTEM";
            if (timeLeft > 60) document.getElementById('currentAction').innerText = "Add Tension Slowly";
            else document.getElementById('currentAction').innerText = "Hypoxic Prep: 3s Hold";
        } else if (phase === "WORKOUT") {
            const step = w.intervals[currentInterval];
            document.getElementById('currentAction').innerText = step.name;
            document.getElementById('zoneName').innerText = step.zone;
            document.getElementById('hrRange').innerText = step.hr + " BPM";
            document.getElementById('zoneDisplay').className = "zone-display " + step.class;
            document.getElementById('racePhase').innerText = step.race;
            document.getElementById('cooldownBtn').style.display = step.allowCD ? "block" : "none";
            
            if (step.class === 'zone-5' && timeLeft < 20) {
                document.getElementById('currentAction').innerText = "HOLD BREATH: 5 REVS";
            }
        } else if (phase === "COOLDOWN") {
            document.getElementById('racePhase').innerText = "FLUSH & RECOVER";
            document.getElementById('currentAction').innerText = "Zero Resistance";
            document.getElementById('zoneName').innerText = "Z1: COOLDOWN";
            document.getElementById('hrRange').innerText = "< 140 BPM";
            document.getElementById('zoneDisplay').className = "zone-display zone-warm";
        }
    }

    document.getElementById('startBtn').onclick = async () => {
        if (!timerId) { 
            await requestWakeLock();
            timerId = setInterval(tick, 1000); 
            document.getElementById('startBtn').innerText = "PAUSE"; 
        }
        else { clearInterval(timerId); timerId = null; document.getElementById('startBtn').innerText = "RESUME"; }
    };

    document.getElementById('cooldownBtn').onclick = () => { phase = "COOLDOWN"; timeLeft = 300; update(); };
    resetDisplay();
</script>
</body>
</html>
