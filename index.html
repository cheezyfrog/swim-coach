<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Swim Coach</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: white; text-align: center; margin: 0; padding: 15px; overflow: hidden; }
        .container { max-width: 450px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 25px; background: #161616; position: relative; }
        .race-phase-box { background: #004466; color: #00d4ff; padding: 10px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; border: 1px solid #00d4ff; text-transform: uppercase; min-height: 1.5em; }
        .timer-display { font-size: 6.5rem; font-weight: 800; margin: 5px 0; font-variant-numeric: tabular-nums; line-height: 1; }
        .action-text { font-size: 1.6rem; font-weight: bold; color: #ffcc00; min-height: 60px; margin-bottom: 10px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; }
        .zone-display { font-size: 1.3rem; padding: 15px; border-radius: 15px; margin-bottom: 10px; font-weight: bold; border: 2px solid transparent; transition: all 0.2s; }
        .hr-target { font-size: 1.5rem; color: #fff; display: block; margin-top: 5px; font-weight: 800; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #222; padding: 10px; border-radius: 12px; }
        .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        button { background: #00d4ff; color: black; border: none; padding: 18px; font-size: 1.3rem; font-weight: bold; border-radius: 15px; width: 100%; margin-top: 10px; cursor: pointer; }
        select { width:100%; padding:12px; margin-bottom: 10px; background:#222; color:white; border-radius:10px; border: 1px solid #444; }
        .zone-5 { background: #7a0000; border-color: #ff0000; }
        .zone-4 { background: #855500; border-color: #ffa500; }
        .zone-2 { background: #1b4d21; border-color: #4caf50; }
        
        /* Motivational Alert Styling */
        .westerns-alert { background: #ff0000 !important; color: #fff !important; animation: pulse 0.5s infinite; border: 4px solid white !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        
        #wakeLockStatus { font-size: 0.65rem; color: #555; margin-top: 8px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <div id="racePhase" class="race-phase-box">PIXEL/iOS READY</div>
    
    <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">Total Time</div><div id="totalTime">00:00</div></div>
        <div class="stat-box"><div class="stat-label">Round / Goal</div><div id="roundInfo">0 / --</div></div>
    </div>

    <select id="workoutSelect" onchange="resetDisplay()">
        <option value="raceReality">Race Reality (1:20 Sim)</option>
        <option value="stackers">30/30/30 Stackers</option>
        <option value="redline">VO2 Max "Redline"</option>
        <option value="vo2MaxRun">VO2 Max Run (4x4 Fartlek)</option>
    </select>

    <div class="timer-display" id="intervalTimer">05:00</div>
    <div id="currentAction" class="action-text">WARM-UP</div>
    
    <div id="zoneDisplay" class="zone-display zone-warm">
        <span id="zoneName">Z1: PREP</span>
        <span id="hrRange" class="hr-target">140 - 155 BPM</span>
    </div>
    
    <button id="startBtn">START SESSION</button>
    <button id="cooldownBtn" style="display:none; background:#004466; color:white;">START COOLDOWN</button>
    <div id="wakeLockStatus">PROTECTION: STANDBY</div>
</div>

<script>
    let wakeLock = null;
    let audioCtx = null;

    async function requestWakeLock() {
        if ('wakeLock' in navigator) {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                document.getElementById('wakeLockStatus').innerText = "PROTECTION: ACTIVE";
                document.getElementById('wakeLockStatus').style.color = "#00ff00";
            } catch (err) {
                document.getElementById('wakeLockStatus').innerText = "PROTECTION: FAILED";
            }
        }
    }

    // New "Piercing" Siren Sound
    function playSiren(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'countdown') {
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else {
            // Final Blast
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.5);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    const workouts = {
        raceReality: { goal: "4-6", intervals: [
            { name: "Heavy Resistance", duration: 40, zone: "Z4: Threshold", hr: "185-195", race: "Pushing Heavy Water", class: "zone-4" },
            { name: "MAX SPRINT", duration: 40, zone: "Z5: MAX", hr: "196-210", race: "Final 25m - No Words!", class: "zone-5" },
            { name: "Active Recovery", duration: 180, zone: "Z2: Recovery", hr: "150-165", race: "Clear the Lactate", class: "zone-2", allowCD: true }
        ]},
        stackers: { goal: "8-12", intervals: [
            { name: "High RPM Build", duration: 30, zone: "Z3: Tempo", hr: "170-185", race: "Fast Feet", class: "zone-3" },
            { name: "GRIND GEAR MAX", duration: 30, zone: "Z5: MAX", hr: "196-210", race: "Explosive Power", class: "zone-5" },
            { name: "Short Rest", duration: 30, zone: "Z2: Recovery", hr: "155-170", race: "Buffer the Burn", class: "zone-2", allowCD: true }
        ]},
        redline: { goal: "5-8", intervals: [
            { name: "Standing Power", duration: 60, zone: "Z5: Redline", hr: "195-210", race: "Engine Growth", class: "zone-5" },
            { name: "Full Recovery", duration: 60, zone: "Z2: Recovery", hr: "150-165", race: "Oxygen Recovery", class: "zone-2", allowCD: true }
        ]},
        vo2MaxRun: { goal: "4", intervals: [
            { name: "VO2 MAX RUN", duration: 240, zone: "Z5: 90-95% EFFORT", hr: "190-205", race: "WESTERNS TIME - DON'T SIT DOWN!", class: "zone-5" },
            { name: "RECOVERY WALK", duration: 180, zone: "Z2: RECOVER", hr: "140-155", race: "Lower the Heart Rate", class: "zone-2", allowCD: true }
        ]}
    };

    let phase = "WARMUP", currentInterval = 0, timeLeft = 300, totalSeconds = 0, timerId = null, rounds = 0;

    function formatTime(s) { return Math.floor(s/60).toString().padStart(2,'0') + ":" + (s%60).toString().padStart(2,'0'); }
    function resetDisplay() { const w = workouts[document.getElementById('workoutSelect').value]; document.getElementById('roundInfo').innerText = "0 / " + w.goal; }

    function tick() {
        if (timeLeft > 0) {
            timeLeft--; totalSeconds++;
            // Siren Sounds
            if (timeLeft < 4 && timeLeft > 0) playSiren('countdown');
            if (timeLeft === 0) playSiren('final');
        } else {
            const w = workouts[document.getElementById('workoutSelect').value];
            if (phase === "WARMUP") { phase = "WORKOUT"; rounds = 1; timeLeft = w.intervals[0].duration; }
            else if (phase === "WORKOUT") {
                currentInterval++;
                if (currentInterval >= w.intervals.length) { currentInterval = 0; rounds++; }
                timeLeft = w.intervals[currentInterval].duration;
            } else if (phase === "COOLDOWN") {
                clearInterval(timerId); if(wakeLock) wakeLock.release();
                location.reload(); return;
            }
        }
        update();
    }

    function update() {
        const zd = document.getElementById('zoneDisplay');
        const ac = document.getElementById('currentAction');
        const w = workouts[document.getElementById('workoutSelect').value];
        const step = w.intervals[currentInterval];

        document.getElementById('intervalTimer').innerText = formatTime(timeLeft);
        document.getElementById('totalTime').innerText = formatTime(totalSeconds);
        document.getElementById('roundInfo').innerText = rounds + " / " + w.goal;

        if (phase === "WARMUP") {
            document.getElementById('racePhase').innerText = "PRIME THE SYSTEM";
            ac.innerText = "Warm-up Spin";
        } else if (phase === "WORKOUT") {
            zd.className = "zone-display " + step.class;
            document.getElementById('zoneName').innerText = step.zone;
            document.getElementById('hrRange').innerText = step.hr + " BPM";
            document.getElementById('racePhase').innerText = step.race;
            document.getElementById('cooldownBtn').style.display = step.allowCD ? "block" : "none";

            // MOTIVATIONAL OVERRIDE
            if (step.class === 'zone-5' && timeLeft <= 10 && timeLeft > 0) {
                zd.classList.add('westerns-alert');
                ac.innerText = "WESTERNS TIME - DON'T SIT DOWN!";
            } else {
                zd.classList.remove('westerns-alert');
                ac.innerText = step.name;
            }
        }
    }

    document.getElementById('startBtn').onclick = async () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (!timerId) { 
            await requestWakeLock();
            timerId = setInterval(tick, 1000); 
            document.getElementById('startBtn').innerText = "PAUSE"; 
        } else { 
            clearInterval(timerId); timerId = null; document.getElementById('startBtn').innerText = "RESUME"; 
        }
    };

    document.getElementById('cooldownBtn').onclick = () => { phase = "COOLDOWN"; timeLeft = 300; update(); };
</script>
</body>
</html>
